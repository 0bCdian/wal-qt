name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system packages
        run: |
          pacman -Syu --noconfirm \
            base-devel git cmake pkgconf \
            qt6-base qt6-webengine qt6-webchannel \
            layer-shell-qt \
            pipewire \
            nodejs \
            go \
            python python-yaml \
            jq
      - uses: actions/checkout@v4
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Set up pnpm via Corepack
        # renderer/package.json pins pnpm@11.1.1; Arch ships an older pnpm package,
        # so we use Corepack (bundled with Node.js) to activate the pinned version.
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate
      - name: deps-check
        run: make deps-check
      - name: build
        run: make build
      - name: test
        # test_health_contract uses QGuiApplication; use the offscreen platform
        # so CTest runs without a Wayland/X11 display server.
        env:
          QT_QPA_PLATFORM: offscreen
        run: make test
      - name: check
        run: make check
      - name: openapi-check
        run: make openapi-check
